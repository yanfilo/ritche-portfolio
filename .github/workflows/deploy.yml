name: Deploy to Cloudflare Workers

# Manual-only. A push to master no longer deploys on its own.
# To ship: GitHub repo -> Actions tab -> "Deploy to Cloudflare Workers"
# -> "Run workflow". Nothing reaches the live site without you clicking that.
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Wrangler globally
        run: npm install -g wrangler@4

      - name: Deploy to Cloudflare Workers
        run: wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      <stop offset="0%" stop-color="#07101E"/>
      <stop offset="50%" stop-color="#0D1A2E"/>
      <stop offset="100%" stop-color="#0F1F38"/>
    </linearGradient>
    <radialGradient id="glow1" cx="15%" cy="30%" r="50%">
